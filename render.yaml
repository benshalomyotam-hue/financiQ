services:
  - type: web
    name: financiq
    runtime: python
    buildCommand: echo "No build needed"
    startCommand: python3 server.py
    envVars:
      - key: PORT
        value: 8080
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASS
        sync: false
    disk:
      name: financiq-data
      mountPath: /data
      sizeGB: 1
