*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Alef',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overscroll-behavior:none;transition:background .3s,color .3s}
input,button,textarea,select{font-family:'Alef',sans-serif;-webkit-appearance:none;border:none;outline:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.spinner{width:18px;height:18px;border:2px solid rgba(128,128,128,.3);border-top-color:var(--acc);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}

.tour-overlay,.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s;backdrop-filter:blur(6px)}

.pw-wrap{position:relative;width:100%}.pw-wrap input{width:100%;padding-right:48px}

.chat-messages{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;max-height:55vh;overflow-y:auto;padding:4px}
.chat-msg{max-width:82%;padding:11px 15px;border-radius:14px;font-size:13px;line-height:1.6;word-wrap:break-word;white-space:pre-wrap}
.chat-msg.user{align-self:flex-end;background:var(--acc);color:#fff;border-bottom-right-radius:4px}
[dir=rtl] .chat-msg.user{border-bottom-right-radius:14px;border-bottom-left-radius:4px}
.chat-msg.assistant{align-self:flex-start;background:var(--card2);color:var(--txt);border-bottom-left-radius:4px;border:1px solid var(--bdr)}
[dir=rtl] .chat-msg.assistant{border-bottom-left-radius:14px;border-bottom-right-radius:4px}
.chat-input-wrap{display:flex;gap:8px;align-items:flex-end}
.chat-input-wrap textarea{flex:1;padding:11px 14px;border-radius:12px;background:var(--card2);border:1px solid var(--bdr);color:var(--txt);font-size:13px;resize:none;min-height:44px;max-height:120px;font-family:'Alef',sans-serif}
.drop-zone{border:2px dashed var(--bdr);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--acc);background:rgba(34,197,94,.04)}
.preview-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.preview-table th{background:var(--card2);padding:7px 10px;text-align:left;font-weight:700;color:var(--acc);border-bottom:1px solid var(--bdr);position:sticky;top:0}
.preview-table td{padding:5px 10px;border-bottom:1px solid rgba(31,45,61,.2);color:var(--txt)}
.alert-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700}
.tab-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px}
.tab-pills button{padding:7px 14px;border-radius:8px;border:1px solid var(--bdr);background:var(--card);color:var(--mut);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}

// ─── Helpers ─────────────────────────────────────────────
function h(tag,props,...ch){
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el[k]=v;
    else if(k==='className')el.className=v;
    else if(k==='innerHTML')el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  ch.flat(9).forEach(c=>{if(c==null||c===false)return;if(typeof c==='string'||typeof c==='number')el.appendChild(document.createTextNode(String(c)));else el.appendChild(c);});
  return el;
}
async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(TOKEN)opts.headers['Authorization']='Bearer '+TOKEN;
  if(body)opts.body=JSON.stringify(body);
  try{
    const res=await fetch(API+path,opts);
    if(res.status===401&&path!=='/login'&&path!=='/register'){
      // Session expired — clear and redirect
      clearSession();VIEW='login';ERR=USER?.lang==='he'?'הפגישה פגה. נא להתחבר מחדש.':'Session expired. Please sign in again.';render();
      throw new Error('Session expired');
    }
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Request failed');
    resetInactivity();
    return data;
  }catch(e){
    if(e.message==='Session expired')throw e;
    if(e.name==='TypeError'&&e.message.includes('fetch')){
      // Network error
      throw new Error(USER?.lang==='he'?'שגיאת רשת. בדוק את החיבור.':'Network error. Check your connection.');
    }
    throw e;
  }
}
function saveSession(){try{localStorage.setItem('fiq_token',TOKEN);localStorage.setItem('fiq_user',JSON.stringify(USER));}catch(e){}}
function loadSession(){try{TOKEN=localStorage.getItem('fiq_token');const u=localStorage.getItem('fiq_user');if(u)USER=JSON.parse(u);}catch(e){}}
function clearSession(){TOKEN=null;USER=null;clearTimeout(INACTIVITY_TIMER);try{localStorage.removeItem('fiq_token');localStorage.removeItem('fiq_user');}catch(e){}}

// ─── Inactivity timeout ─────────────────────────────────
function resetInactivity(){
  clearTimeout(INACTIVITY_TIMER);
  INACTIVITY_WARNING=false;
  const w=document.querySelector('.inactivity-warning');if(w)w.remove();
  if(!TOKEN)return;
  INACTIVITY_TIMER=setTimeout(()=>{
    INACTIVITY_WARNING=true;
    const overlay=h('div',{className:'modal-overlay inactivity-warning'},
      h('div',{className:'modal-card',style:{textAlign:'center'}},
        h('div',{style:{fontSize:'40px',marginBottom:'12px'}},'⏰'),
        h('div',{style:{fontSize:'16px',fontWeight:'700',marginBottom:'8px'}},t('sessionWarning')),
        h('div',{style:{display:'flex',gap:'10px',marginTop:'20px'}},
          h('button',{style:{flex:1,padding:'12px',borderRadius:'12px',background:'var(--card2)',border:'1px solid var(--bdr)',color:'var(--txt)',fontWeight:'700',cursor:'pointer'},
            onclick:()=>{clearSession();VIEW='login';render();overlay.remove();}},t('signOut')),
          h('button',{style:{flex:1,padding:'12px',borderRadius:'12px',background:'var(--acc)',color:'#fff',fontWeight:'700',cursor:'pointer'},
            onclick:()=>{api('POST','/heartbeat').catch(()=>{});overlay.remove();resetInactivity();}},t('stayLoggedIn'))
        )));
    document.body.appendChild(overlay);
    // Auto-logout after 2 more minutes
    setTimeout(()=>{if(INACTIVITY_WARNING){clearSession();VIEW='login';render();}},120000);
  },1800000); // 30 minutes
}
['click','keydown','scroll','touchstart'].forEach(e=>document.addEventListener(e,()=>{if(TOKEN&&!INACTIVITY_WARNING)resetInactivity();},{passive:true}));

// ─── Error boundary for async actions ───────────────────

    if(e.message!=='Session expired')showToast(e.message,'error');

  let un='',pw='';
  const card=h('div',{style:{background:'var(--card)',borderRadius:'14px',padding:'28px',border:'1px solid var(--bdr)'}},
    h('div',{style:{fontSize:'18px',fontWeight:'700',marginBottom:'4px'}},t('signIn')),
    h('div',{style:{fontSize:'12px',color:'var(--mut)',marginBottom:'20px'}},t('signInSub')),
    errBox(ERR),
    inputField(t('username'),'text',un,function(e){un=e.target.value;}),
    passwordField(t('password'),pw,function(e){pw=e.target.value;},function(e){if(e.key==='Enter')doLogin();}),
    btnPrimary(t('signIn'),doLogin,LOADING),
    h('div',{style:{textAlign:'center',marginTop:'16px',fontSize:'13px',color:'var(--mut)'}},t('noAccount')+' ',
      h('button',{style:{background:'none',border:'none',color:'var(--acc)',fontWeight:'700',fontSize:'13px',cursor:'pointer'},onclick:()=>{ERR='';VIEW='register';render();}},t('createOne'))));
  async function doLogin(){
    if(!un||!pw){ERR=t('fillFields');render();return;}
    ERR='';LOADING=true;render();
    try{
      const res=await api('POST','/login',{username:un,password:pw});
      TOKEN=res.token;USER=res.user;saveSession();LOADING=false;
      applyUserTheme();
      resetInactivity();
      VIEW=USER.role&&(USER.role==='master_admin'||USER.role==='admin')?'admin':'app';
      render();
      if(!USER.terms_accepted)showTerms();
      else if(!USER.onboarding_done)showOnboarding();
      else if(!USER.tour_completed)showTour();
    }catch(e){ERR=e.message;LOADING=false;render();}
  }
  authPage(app,card);
}

      const over=pct>100;
      c.appendChild(h('div',{style:{background:'var(--card)',borderRadius:'16px',padding:'18px',border:'1px solid var(--bdr)',marginBottom:'16px',display:'flex',alignItems:'center',gap:'16px'},className:'fu'},

    }
    // Month-over-Month
    if(s.prev_month_expenses>0||s.month_expenses>0){
      const diff=s.month_expenses-s.prev_month_expenses;
      const pctChange=s.prev_month_expenses>0?Math.round((diff/s.prev_month_expenses)*100):0;
      const isUp=diff>0;
      c.appendChild(h('div',{style:{background:'var(--card)',borderRadius:'16px',padding:'18px',border:'1px solid var(--bdr)',marginBottom:'16px'},className:'fu'},
        h('div',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'10px'}},'📅 '+t('momComparison')),
        h('div',{style:{display:'flex',gap:'16px',alignItems:'center'}},
          h('div',{style:{flex:1}},
            h('div',{style:{fontSize:'11px',color:'var(--mut)',marginBottom:'2px'}},t('monthExpenses')),
            h('div',{style:{fontSize:'18px',fontWeight:'700'}},'₪'+Number(s.month_expenses).toLocaleString())),
          h('div',{style:{fontSize:'20px',color:'var(--mut)'}},'vs'),

            h('div',{style:{fontSize:'18px',fontWeight:'700'}},'₪'+Number(s.prev_month_expenses).toLocaleString()))),
        h('div',{style:{marginTop:'10px',padding:'8px 12px',borderRadius:'8px',background:isUp?'rgba(239,68,68,.1)':'rgba(16,185,129,.1)',textAlign:'center',fontSize:'13px',fontWeight:'700',color:isUp?'var(--red)':'var(--grn)'}},
          (isUp?'↑':'↓')+' '+Math.abs(pctChange)+'% (₪'+Math.abs(diff).toLocaleString()+') '+(isUp?t('momUp'):t('momDown')))));
    }
    // AI Tips
    if(s.ai_tips&&s.ai_tips.length){
      c.appendChild(h('div',{style:{background:'var(--card)',borderRadius:'16px',padding:'18px',border:'1px solid rgba(34,197,94,.3)',marginBottom:'16px'},className:'fu'},
        h('div',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'12px',display:'flex',alignItems:'center',gap:'8px'}},'💡 '+t('aiTips')),
        ...s.ai_tips.map(tip=>h('div',{style:{padding:'10px 14px',background:'var(--card2)',borderRadius:'10px',marginBottom:'6px',fontSize:'13px',lineHeight:'1.5'}},tip))));
    } else if(s.total_transactions>3){
      c.appendChild(h('div',{style:{background:'var(--card)',borderRadius:'16px',padding:'18px',border:'1px solid var(--bdr)',marginBottom:'16px',textAlign:'center'},className:'fu'},
        h('div',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'10px'}},'💡 '+t('aiTips')),
        h('button',{style:{padding:'10px 24px',borderRadius:'10px',background:'var(--acc)',color:'#fff',fontWeight:'700',fontSize:'13px',cursor:'pointer'},

    }
    // Household
    if(s.household){
      const hh=s.household;
      c.appendChild(h('div',{style:{background:'var(--card)',borderRadius:'16px',padding:'18px',border:'1px solid var(--bdr)',marginBottom:'16px'},className:'fu'},
        h('div',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'10px'}},'🏠 '+hh.name+' — ₪'+Number(hh.total).toLocaleString()),

        h('button',{style:{marginTop:'16px',padding:'10px 24px',borderRadius:'10px',background:'var(--acc)',color:'#fff',fontWeight:'700',cursor:'pointer'},onclick:()=>{APP_TAB='transactions';render();}},t('addTx'))));
    }
  }catch(e){ld.remove();retryBox(c,e.message,()=>renderDashboard(c));}
}

async function renderTransactions(c){
  let showForm=false,searchQ='',filterType='';
  const formBox=h('div',{style:{marginBottom:'16px'}});
  const filterBox=h('div',{style:{marginBottom:'16px'}});
  const listBox=h('div',{className:'fu'});
  // Filter bar

    h('input',{type:'text',placeholder:'🔍 '+t('search'),style:{flex:1,minWidth:'150px',padding:'10px 14px',borderRadius:'10px',background:'var(--card2)',border:'1px solid var(--bdr)',color:'var(--txt)',fontSize:'13px'},
      oninput:function(e){searchQ=e.target.value;loadTx();}}),
    ...[['',t('all')],['expense',t('expense')],['income',t('income')],['recurring',t('recurring')]].map(([v,l])=>
      h('button',{style:{padding:'8px 14px',borderRadius:'8px',background:filterType===v?'var(--acc)':'var(--card)',border:'1px solid '+(filterType===v?'var(--acc)':'var(--bdr)'),color:filterType===v?'#fff':'var(--mut)',fontSize:'11px',fontWeight:'700',cursor:'pointer'},

  // Add form
  function renderForm(){
    formBox.innerHTML='';
    if(!showForm){
      formBox.appendChild(h('button',{style:{width:'100%',padding:'14px',borderRadius:'14px',background:'var(--card)',border:'2px dashed var(--bdr)',color:'var(--acc)',fontWeight:'700',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'},onclick:()=>{showForm=true;renderForm();}},'+  '+t('addTx')));
      return;
    }
    let txD=new Date().toISOString().slice(0,10),txDesc='',txAmt='',txCat='Food',txType='expense',txCard='',txRec=false;
    const cats=['Food','Transport','Shopping','Entertainment','Bills','Health','Education','Salary','Freelance','Gift','Mortgage','Insurance','Subscription','Other'];
    formBox.appendChild(h('div',{style:{background:'var(--card)',borderRadius:'16px',padding:'20px',border:'1px solid rgba(34,197,94,.3)'}},
      h('div',{style:{fontSize:'15px',fontWeight:'700',marginBottom:'14px'}},t('addTx')),
      // Receipt scanner
      receiptScannerBtn(function(tx){
        if(tx.date){const di=formBox.querySelector('input[type=date]');if(di){di.value=tx.date;txD=tx.date;}}
        if(tx.description){const ds=formBox.querySelectorAll('input[type=text]');if(ds[0]){ds[0].value=tx.description;txDesc=tx.description;}}
        if(tx.amount){const am=formBox.querySelector('input[type=number]');if(am){am.value=tx.amount;txAmt=String(tx.amount);}}
        if(tx.category)txCat=tx.category;
        renderForm();
      }),
      h('div',{style:{display:'flex',gap:'8px',marginBottom:'12px'}},
        h('button',{style:{flex:1,padding:'10px',borderRadius:'10px',background:txType==='expense'?'rgba(239,68,68,.15)':'var(--card2)',border:'1px solid '+(txType==='expense'?'var(--red)':'var(--bdr)'),color:txType==='expense'?'var(--red)':'var(--mut)',fontWeight:'700',fontSize:'13px',cursor:'pointer'},onclick:()=>{txType='expense';renderForm();}},t('expense')),
        h('button',{style:{flex:1,padding:'10px',borderRadius:'10px',background:txType==='income'?'rgba(16,185,129,.15)':'var(--card2)',border:'1px solid '+(txType==='income'?'var(--grn)':'var(--bdr)'),color:txType==='income'?'var(--grn)':'var(--mut)',fontWeight:'700',fontSize:'13px',cursor:'pointer'},onclick:()=>{txType='income';renderForm();}},t('income'))),
      inputField(t('date'),'date',txD,function(e){txD=e.target.value;}),
      inputField(t('description'),'text',txDesc,function(e){txDesc=e.target.value;}),
      inputField(t('amount'),'number',txAmt,function(e){txAmt=e.target.value;}),
      h('select',{style:{width:'100%',padding:'14px',borderRadius:'12px',background:'var(--card2)',border:'1px solid var(--bdr)',color:'var(--txt)',fontSize:'14px',marginBottom:'12px'},onchange:function(e){txCat=e.target.value;}},
        ...cats.map(c=>h('option',{value:c,style:{background:'var(--card2)'}},c))),
      inputField(t('cardName')+' (optional)','text',txCard,function(e){txCard=e.target.value;}),
      h('label',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'16px',fontSize:'13px',color:'var(--mut)',cursor:'pointer'}},
        h('input',{type:'checkbox',style:{width:'18px',height:'18px'},onchange:function(e){txRec=e.target.checked;}}),t('recurring')),
      h('div',{style:{display:'flex',gap:'8px'}},
        h('button',{style:{flex:1,padding:'12px',borderRadius:'12px',background:'var(--card2)',border:'1px solid var(--bdr)',color:'var(--txt)',fontWeight:'700',cursor:'pointer'},onclick:()=>{showForm=false;renderForm();}},t('cancel')),
        h('button',{style:{flex:1,padding:'12px',borderRadius:'12px',background:'var(--acc)',color:'#fff',fontWeight:'700',cursor:'pointer'},onclick:async()=>{
          if(!txDesc||!txAmt)return showToast(t('fillFields'),'error');
          try{await api('POST','/transactions',{transactions:[{date:txD,description:txDesc,amount:parseFloat(txAmt),category:txCat,type:txType,card_name:txCard,is_recurring:txRec}]});showForm=false;renderForm();loadTx();}catch(e){showToast(e.message,'error');}
        }},t('save')))));
  }
  renderForm();c.appendChild(formBox);c.appendChild(listBox);
  async function loadTx(){
    listBox.innerHTML='';

async function renderBudgets(c){
  const cats=['Food','Transport','Shopping','Entertainment','Bills','Health','Education','Salary','Freelance','Gift','Mortgage','Insurance','Subscription','Other'];
  let showForm=false,editCat='';
  const fb=h('div',{style:{marginBottom:'16px'}});
  const lb=h('div',{className:'fu'});

  async function loadBudgets(){
    lb.innerHTML='';
    try{
      const budgets=await api('GET','/budgets');
      const stats=await api('GET','/stats');
      const catMap={};
      if(stats.categories)stats.categories.forEach(c=>{catMap[c.category]=c.total;});

      if(!Object.keys(budgets).length){
        lb.appendChild(h('div',{style:{textAlign:'center',padding:'40px',color:'var(--mut)',background:'var(--card)',borderRadius:'16px',border:'1px solid var(--bdr)'}},
          h('div',{style:{fontSize:'40px',marginBottom:'12px'}},'📋'),

      Object.entries(budgets).sort((a,b)=>b[1]-a[1]).forEach(([cat,limit])=>{

        lb.appendChild(h('div',{style:{background:'var(--card)',borderRadius:'16px',padding:'18px',border:'1px solid '+(over?'rgba(239,68,68,.3)':warn?'rgba(34,197,94,.3)':'var(--bdr)'),marginBottom:'12px'}},

              h('div',{style:{fontSize:'14px',fontWeight:'700'}},cat),
              h('div',{style:{fontSize:'12px',color:'var(--mut)'}},'₪'+Number(spent).toLocaleString()+' / ₪'+Number(limit).toLocaleString())),
            h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
              h('span',{style:{fontSize:'14px',fontWeight:'700',color:over?'var(--red)':warn?'var(--acc)':'var(--grn)'}},pct+'%'),
              h('button',{style:{background:'none',border:'none',color:'var(--mut)',cursor:'pointer',fontSize:'12px'},
                onclick:()=>{confirmDialog(t('removeBudget')+' '+cat+'?',async()=>{try{await api('POST','/budgets/delete',{category:cat});loadBudgets();showToast('✓','success');}catch(e){showToast(e.message,'error');}});}},'✕'))),
          h('div',{style:{width:'100%',height:'10px',borderRadius:'5px',background:'var(--card2)'}},
            h('div',{style:{width:Math.min(pct,100)+'%',height:'100%',borderRadius:'5px',background:over?'var(--red)':warn?'var(--acc)':'var(--grn)',transition:'width .5s'}}))));
      });
    }catch(e){retryBox(lb,e.message,loadBudgets);}

  function renderForm(){
    fb.innerHTML='';
    if(!showForm){
      fb.appendChild(h('button',{style:{width:'100%',padding:'14px',borderRadius:'14px',background:'var(--card)',border:'2px dashed var(--bdr)',color:'var(--acc)',fontWeight:'700',cursor:'pointer'},
        onclick:()=>{showForm=true;renderForm();}},'+  '+t('addBudget')));
      return;
    }
    let selCat=cats[0],amt='';
    fb.appendChild(h('div',{style:{background:'var(--card)',borderRadius:'16px',padding:'20px',border:'1px solid rgba(34,197,94,.3)'}},
      h('div',{style:{fontSize:'15px',fontWeight:'700',marginBottom:'14px'}},t('addBudget')),
      h('select',{style:{width:'100%',padding:'14px',borderRadius:'12px',background:'var(--card2)',border:'1px solid var(--bdr)',color:'var(--txt)',fontSize:'14px',marginBottom:'12px'},
        onchange:function(e){selCat=e.target.value;}},
        ...cats.map(c=>h('option',{value:c,style:{background:'var(--card2)'}},c))),
      inputField('₪ '+t('budgetAmount'),'number',amt,function(e){amt=e.target.value;}),
      h('div',{style:{display:'flex',gap:'8px'}},
        h('button',{style:{flex:1,padding:'12px',borderRadius:'12px',background:'var(--card2)',border:'1px solid var(--bdr)',color:'var(--txt)',fontWeight:'700',cursor:'pointer'},
          onclick:()=>{showForm=false;renderForm();}},t('cancel')),
        h('button',{style:{flex:1,padding:'12px',borderRadius:'12px',background:'var(--acc)',color:'#fff',fontWeight:'700',cursor:'pointer'},
          onclick:async()=>{
            if(!amt)return showToast(t('fillFields'),'error');
            try{await api('POST','/budgets',{budgets:{[selCat]:parseFloat(amt)}});showForm=false;renderForm();loadBudgets();}catch(e){showToast(e.message,'error');}

}

// ═══════════════════════════ RECEIPT SCANNER ═══════════════════════════
function receiptScannerBtn(onResult){
  return h('button',{style:{width:'100%',padding:'14px',borderRadius:'14px',background:'var(--card)',border:'2px dashed var(--bdr)',color:'var(--acc2)',fontWeight:'700',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',marginBottom:'12px'},
    onclick:()=>{
      const input=document.createElement('input');
      input.type='file';input.accept='image/*';input.capture='environment';
      input.onchange=async function(e){
        if(!e.target.files.length)return;
        const file=e.target.files[0];
        const reader=new FileReader();
        reader.onload=async function(ev){
          const base64=ev.target.result;
          // Show scanning state
          const overlay=h('div',{className:'modal-overlay'},
            h('div',{className:'modal-card',style:{textAlign:'center'}},
              h('div',{className:'spinner',style:{width:'40px',height:'40px',margin:'0 auto 16px'}}),
              h('div',{style:{fontSize:'16px',fontWeight:'700'}},t('scanning'))));
          document.body.appendChild(overlay);
          try{
            const res=await api('POST','/scan-receipt',{image:base64});
            overlay.remove();
            if(res.transaction)onResult(res.transaction);
            else showToast(USER?.lang==='he'?'לא ניתן לקרוא קבלה':'Could not read receipt','error');
          }catch(err){overlay.remove();showToast(err.message,'error');}
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }},
    h('span',{style:{fontSize:'18px'}},'📸'), t('scanReceipt'));
}

// ═══════════════════════════ UPLOAD ═══════════════════════════
function renderUpload(c){
  let parsed=null,headers=[],mapping={},fName='',importStatus='',importCount=0;
  const tgt=['(skip)','date','description','amount','category','method','type','card_name'];
  const w=h('div',{className:'fu'});c.appendChild(w);
  function dr(){
    w.innerHTML='';
    if(!parsed){
      const dz=h('div',{className:'drop-zone'},h('div',{style:{fontSize:'48px',marginBottom:'12px'}},'📁'),
        h('div',{style:{fontSize:'16px',fontWeight:'700',marginBottom:'6px'}},t('uploadCsv')),
        h('div',{style:{fontSize:'13px',color:'var(--mut)',marginBottom:'16px'}},t('uploadDesc')),
        h('button',{style:{padding:'12px 28px',borderRadius:'12px',background:'var(--acc)',color:'#fff',fontWeight:'700',cursor:'pointer'},onclick:()=>fi.click()},t('selectFile')));
      dz.ondragover=e=>{e.preventDefault();dz.classList.add('drag-over');};
      dz.ondragleave=()=>dz.classList.remove('drag-over');
      dz.ondrop=e=>{e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files.length)hf(e.dataTransfer.files[0]);};
      const fi=h('input',{type:'file',accept:'.csv,.xls,.xlsx,.tsv',style:{display:'none'},onchange:function(e){if(e.target.files.length)hf(e.target.files[0]);}});
      w.appendChild(dz);w.appendChild(fi);return;
    }
    w.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}},
      h('div',{},h('div',{style:{fontSize:'16px',fontWeight:'700'}},fName),h('div',{style:{fontSize:'12px',color:'var(--mut)'}},parsed.length+' '+t('rows'))),
      h('button',{style:{padding:'6px 16px',borderRadius:'8px',background:'var(--card2)',border:'1px solid var(--bdr)',color:'var(--mut)',fontSize:'12px',cursor:'pointer'},onclick:()=>{parsed=null;headers=[];mapping={};dr();}},'✕ Reset')));
    const mc=h('div',{style:{background:'var(--card)',borderRadius:'16px',padding:'18px',border:'1px solid var(--bdr)',marginBottom:'16px'}},
      h('div',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'12px'}},t('columnMapping')));
    headers.forEach(col=>{
      mc.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}},
        h('div',{style:{flex:1,fontSize:'13px',fontWeight:'700',color:'var(--acc)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},col),
        h('span',{style:{color:'var(--mut)',fontSize:'12px'}},'→'),
        h('select',{style:{flex:1,padding:'8px',borderRadius:'8px',background:'var(--card2)',border:'1px solid var(--bdr)',color:'var(--txt)',fontSize:'12px'},
          onchange:function(e){mapping[col]=e.target.value;dr();}},
          ...tgt.map(f=>h('option',{value:f,selected:mapping[col]===f,style:{background:'var(--card2)'}},f)))));
    });
    w.appendChild(mc);
    if(!Object.keys(mapping).length){
      headers.forEach(col=>{
        const lc=col.toLowerCase().trim();
        if(lc.includes('date')||lc.includes('תאריך'))mapping[col]='date';
        else if(lc.includes('desc')||lc.includes('תיאור')||lc.includes('memo')||lc.includes('פירוט'))mapping[col]='description';
        else if(lc.includes('amount')||lc.includes('sum')||lc.includes('סכום'))mapping[col]='amount';
        else if(lc.includes('categ')||lc.includes('קטגוריה'))mapping[col]='category';
        else if(lc.includes('card')||lc.includes('כרטיס'))mapping[col]='card_name';
        else mapping[col]='(skip)';
      });dr();return;
    }
    const mapped=headers.filter(c=>mapping[c]&&mapping[c]!=='(skip)');
    if(mapped.length){
      const pc=h('div',{style:{background:'var(--card)',borderRadius:'16px',padding:'14px',border:'1px solid var(--bdr)',marginBottom:'16px',overflowX:'auto'}},
        h('div',{style:{fontSize:'13px',fontWeight:'700',marginBottom:'8px'}},t('preview')));
      const tb=h('table',{className:'preview-table'}),th=h('tr');
      mapped.forEach(c=>th.appendChild(h('th',{},mapping[c])));tb.appendChild(th);
      parsed.slice(0,6).forEach(row=>{const tr=h('tr');mapped.forEach(c=>tr.appendChild(h('td',{},String(row[c]||''))));tb.appendChild(tr);});
      pc.appendChild(tb);w.appendChild(pc);
    }
    const hasD=Object.values(mapping).includes('date'),hasA=Object.values(mapping).includes('amount');
    if(importStatus==='done'){
      w.appendChild(successBox(t('imported')+' '+importCount+' '+t('rows')));
      w.appendChild(h('button',{style:{width:'100%',padding:'14px',borderRadius:'12px',background:'var(--acc)',color:'#fff',fontWeight:'700',cursor:'pointer'},onclick:()=>{APP_TAB='transactions';render();}},t('transactions')+' →'));
    }else{
      w.appendChild(h('button',{style:{width:'100%',padding:'14px',borderRadius:'14px',background:hasD&&hasA?'var(--acc)':'var(--card2)',color:hasD&&hasA?'#fff':'var(--mut)',fontWeight:'700',cursor:'pointer',opacity:importStatus==='importing'?'.7':'1'},
        onclick:hasD&&hasA&&importStatus!=='importing'?doImport:null},importStatus==='importing'?t('importing'):t('importBtn')+' '+parsed.length+' '+t('rows')));
    }
  }
  function hf(file){
    fName=file.name;const reader=new FileReader();
    reader.onload=function(e){try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
      const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      if(!json.length){showToast('Empty file','error');return;}parsed=json;headers=Object.keys(json[0]);mapping={};dr();
    }catch(err){showToast(err.message,'error');}};reader.readAsArrayBuffer(file);
  }
  async function doImport(){
    importStatus='importing';dr();
    const txns=parsed.map(row=>{
      const tx={};Object.entries(mapping).forEach(([col,field])=>{
        if(field==='(skip)')return;let val=row[col];
        if(field==='amount'){val=parseFloat(String(val).replace(/[^0-9.\-]/g,''))||0;if(val<0)val=Math.abs(val);}
        if(field==='date'&&val instanceof Date)val=val.toISOString().slice(0,10);
        else if(field==='date'){const d=new Date(val);val=isNaN(d)?String(val):d.toISOString().slice(0,10);}
        tx[field]=val;});
      if(!tx.type)tx.type='expense';if(!tx.description)tx.description='Imported';return tx;
    }).filter(tx=>tx.date&&tx.amount);
    try{const r=await api('POST','/transactions',{transactions:txns});importCount=r.count||txns.length;importStatus='done';dr();}
    catch(e){importStatus='';showToast(e.message,'error');dr();}
  }
  dr();
}

// ═══════════════════════════ AI AGENT ═══════════════════════════
function renderAI(c){
  const w=h('div',{className:'fu chat-wrap-dvh',style:{display:'flex',flexDirection:'column',height:IS_MOBILE?'calc(100vh - 180px)':'calc(100vh - 160px)'}});c.appendChild(w);
  w.appendChild(h('div',{style:{marginBottom:'12px'}},
    h('div',{style:{fontSize:'16px',fontWeight:'700',display:'flex',alignItems:'center',gap:'8px'}},
      h('span',{style:{width:'28px',height:'28px',borderRadius:'8px',background:'var(--acc)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:'14px',color:'#fff'}},'AI'),t('aiAgent')),
    h('div',{style:{fontSize:'12px',color:'var(--mut)',marginTop:'2px'}},t('aiDesc'))));
  const md=h('div',{className:'chat-messages'});
  if(!AI_HISTORY.length)md.appendChild(h('div',{className:'chat-msg assistant'},t('aiWelcome')));
  AI_HISTORY.forEach(m=>{
    const msgEl=h('div',{className:'chat-msg '+m.role},m.content);
    md.appendChild(msgEl);
  });
  w.appendChild(md);setTimeout(()=>{md.scrollTop=md.scrollHeight;},50);
  let iv='',sending=false;
  const iw=h('div',{className:'chat-input-wrap',style:{marginTop:'auto',paddingBottom:IS_MOBILE?'8px':'0'}});
  const ta=h('textarea',{placeholder:t('aiPlaceholder'),rows:'1',
    oninput:function(e){iv=e.target.value;this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';},
    onfocus:function(){if(IS_MOBILE)setTimeout(()=>{md.scrollTop=md.scrollHeight;},300);},
    onkeydown:function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}}});
  iw.appendChild(ta);
  iw.appendChild(h('button',{className:'chat-send-btn',onclick:doSend},'→'));
  w.appendChild(iw);
  async function doSend(){
    const msg=iv.trim()||ta.value.trim();if(!msg||sending)return;sending=true;
    AI_HISTORY.push({role:'user',content:msg});md.appendChild(h('div',{className:'chat-msg user'},msg));
    ta.value='';iv='';ta.style.height='44px';
    if(IS_MOBILE)ta.blur(); // Hide keyboard while waiting
    const thinking=h('div',{className:'chat-msg assistant',style:{opacity:'.6',animation:'pulse 1.5s ease infinite'}},t('aiThinking'));
    md.appendChild(thinking);md.scrollTop=md.scrollHeight;
    try{
      const r=await api('POST','/ai-chat',{message:msg,history:AI_HISTORY.slice(0,-1)});
      thinking.remove();
      const replyText=r.reply||'...';
      AI_HISTORY.push({role:'assistant',content:replyText});
      md.appendChild(h('div',{className:'chat-msg assistant'},replyText));
      // If AI created a transaction, show confirmation
      if(r.added_tx){
        const tx=r.added_tx;
        const isInc=tx.type==='income';
        const txNotice=h('div',{style:{padding:'10px 14px',borderRadius:'10px',background:isInc?'rgba(34,197,94,.12)':'rgba(244,63,94,.12)',border:'1px solid '+(isInc?'rgba(34,197,94,.25)':'rgba(244,63,94,.25)'),fontSize:'12px',marginTop:'6px',display:'flex',alignItems:'center',gap:'8px'}},
          h('span',{style:{fontWeight:'700',color:isInc?'var(--grn)':'var(--red)'}},(isInc?'+':'-')+'₪'+Number(tx.amount).toLocaleString()),
          h('span',{style:{color:'var(--mut)'}},tx.description+' · '+tx.category),
          h('span',{style:{fontSize:'10px',padding:'2px 8px',borderRadius:'6px',background:'var(--acc)',color:'#fff',fontWeight:'700'}},'✓ Added'));
        md.appendChild(txNotice);
      }
    }catch(e){thinking.remove();md.appendChild(h('div',{className:'chat-msg assistant',style:{borderColor:'var(--red)',color:'var(--red)'}},e.message));}
    md.scrollTop=md.scrollHeight;sending=false;
  }
}

    return card;
  }
  if(pending.length){main.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'700',marginBottom:'10px',color:'var(--acc)'}},t('pending')+' ('+pending.length+')'));pending.forEach(u=>main.appendChild(uCard(u,'pending')));}
  main.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'700',marginBottom:'10px',marginTop:'16px',color:'var(--grn)'}},t('active')+' ('+active.length+')'));active.forEach(u=>main.appendChild(uCard(u,'active')));
  if(inactive.length){main.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'700',marginBottom:'10px',marginTop:'16px',color:'var(--red)'}},t('inactive')+' ('+inactive.length+')'));inactive.forEach(u=>main.appendChild(uCard(u,'inactive')));}
  page.appendChild(main);app.appendChild(page);
}

// ═══════════════════════════ BOOT ═══════════════════════════
loadSession();
if(TOKEN&&USER){
  applyUserTheme(); // Apply cached theme immediately while loading
  api('GET','/me').then(res=>{
    USER=Object.assign(USER,res);saveSession();applyUserTheme();resetInactivity();
    VIEW=USER.role&&USER.role!=='user'?'admin':'app';render();
    if(!USER.terms_accepted)showTerms();
    else if(!USER.onboarding_done)showOnboarding();
  }).catch(e=>{
    if(e.message==='Session expired'){
      // Already handled in api() — just render login
      return;
    }
    if(e.message&&(e.message.includes('Network')||e.message.includes('fetch'))){
      // Network error — show retry instead of dumping to login
      const app=document.getElementById('app');app.innerHTML='';
      app.appendChild(h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',background:'var(--bg)'}},
        h('div',{style:{textAlign:'center',maxWidth:'360px'}},
          h('div',{style:{fontSize:'48px',marginBottom:'16px'}},'📡'),
          h('div',{style:{fontSize:'18px',fontWeight:'700',marginBottom:'8px',color:'var(--txt)'}},
            USER?.lang==='he'?'אין חיבור לשרת':'Cannot reach server'),
          h('div',{style:{fontSize:'13px',color:'var(--mut)',marginBottom:'24px',lineHeight:'1.6'}},
            USER?.lang==='he'?'בדוק את החיבור לאינטרנט ונסה שוב':'Check your internet connection and try again'),
          h('button',{style:{padding:'14px 32px',borderRadius:'12px',background:'var(--acc)',color:'#fff',fontWeight:'700',fontSize:'15px',cursor:'pointer'},
            onclick:()=>location.reload()},
            USER?.lang==='he'?'נסה שוב':'Retry'))));
      return;
    }
    // Unknown error — fall back to login
    clearSession();VIEW='login';render();
  });
}else{VIEW='login';render();}
</script>
</body>
</html>
